# Append to ~/.codex/config.toml and merge existing content.

[features]
hooks = true

[sandbox_workspace_write]
# install-hook.py writes your absolute home path automatically.
writable_roots = ["/Users/YOUR_USER/.teach_me_skill"]

[[hooks.PreToolUse]]
matcher = "*"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "python3 ~/.codex/skills/teach-me/scripts/teach_me_hook.py"

[[hooks.PostToolUse]]
matcher = "*"
[[hooks.PostToolUse.hooks]]
type = "command"
command = "python3 ~/.codex/skills/teach-me/scripts/teach_me_hook.py"

[[hooks.Stop]]
matcher = "*"
[[hooks.Stop.hooks]]
type = "command"
command = "python3 ~/.codex/skills/teach-me/scripts/teach_me_hook.py"
