# Append to ~/.codex/config.toml and merge existing content.

[features]
hooks = true

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "python3 ~/.codex/skills/teach-me/scripts/teach_me_hook.py"

[[hooks.PreToolUse]]
matcher = "*"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "python3 ~/.codex/skills/teach-me/scripts/teach_me_hook.py"

[[hooks.PostToolUse]]
matcher = "*"
[[hooks.PostToolUse.hooks]]
type = "command"
command = "python3 ~/.codex/skills/teach-me/scripts/teach_me_hook.py"

[[hooks.Stop]]
matcher = "*"
[[hooks.Stop.hooks]]
type = "command"
command = "python3 ~/.codex/skills/teach-me/scripts/teach_me_hook.py"
