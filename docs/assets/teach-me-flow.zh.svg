<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Teach Me hook 工作流</title>
  <desc id="desc">流程图展示 Prompt hook、工具证据、Stop 评分、短复盘和本地 Obsidian 学习 vault。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#eef6f1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b46b43"/>
      <stop offset="0.52" stop-color="#4d8b78"/>
      <stop offset="1" stop-color="#476f9e"/>
    </linearGradient>
    <filter id="soft" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1b1a18" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#4d8b78"/>
    </marker>
    <style>
      .bg{fill:url(#paper)}
      .panel{fill:#fff;stroke:#ddd7ca;stroke-width:2;filter:url(#soft)}
      .soft{fill:#f4f1e9;stroke:#ddd7ca;stroke-width:2}
      .title{font:700 34px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#1b1a18}
      .label{font:700 24px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#1b1a18}
      .small{font:500 17px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#625d52}
      .mono{font:500 17px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#4a4742}
      .accent{fill:url(#accent)}
      .line{stroke:#4d8b78;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .thin{stroke:#d6d1c4;stroke-width:2;fill:none}
      .dot{fill:#4d8b78}
    </style>
  </defs>

  <rect class="bg" width="1120" height="760" rx="34"/>
  <path class="thin" d="M84 104 C250 52 384 64 520 116 S806 178 1030 94"/>
  <path class="thin" d="M78 640 C260 584 406 604 562 658 S828 718 1044 606"/>

  <g transform="translate(70 66)">
    <text class="title" x="0" y="0">Teach Me</text>
    <text class="small" x="0" y="34">Hook 负责收集证据，runtime 只沉淀真正有用的学习内容。</text>
  </g>

  <g transform="translate(76 162)">
    <rect class="panel" width="262" height="174" rx="16"/>
    <circle class="accent" cx="42" cy="46" r="18"/>
    <text class="label" x="76" y="54">Prompt hook</text>
    <text class="small" x="28" y="96">开发或教学提示词</text>
    <text class="small" x="28" y="124">注入紧凑上下文</text>
    <text class="mono" x="28" y="152">UserPromptSubmit</text>
  </g>

  <g transform="translate(76 424)">
    <rect class="panel" width="262" height="174" rx="16"/>
    <circle class="accent" cx="42" cy="46" r="18"/>
    <text class="label" x="76" y="54">工具 hooks</text>
    <text class="small" x="28" y="96">编辑、测试、构建、报错</text>
    <text class="small" x="28" y="124">变成可评分证据</text>
    <text class="mono" x="28" y="152">Pre / Post / Failure</text>
  </g>

  <path class="line" d="M356 252 C414 252 430 252 484 252"/>
  <path class="line" d="M356 514 C414 514 430 488 484 438"/>

  <g transform="translate(500 258)">
    <rect class="panel" width="282" height="206" rx="16"/>
    <text class="label" x="28" y="52">Stop 评分</text>
    <text class="small" x="28" y="90">汇总这一轮证据</text>
    <text class="small" x="28" y="118">证据弱就保持安静</text>
    <text class="small" x="28" y="146">值得复盘才拦一次</text>
    <text class="mono" x="28" y="178">Stop → short review</text>
    <circle class="dot" cx="238" cy="52" r="8"/>
    <circle class="dot" cx="238" cy="92" r="8" opacity="0.72"/>
    <circle class="dot" cx="238" cy="132" r="8" opacity="0.44"/>
  </g>

  <path class="line" d="M802 360 C852 360 866 298 914 274"/>

  <g transform="translate(932 174)">
    <rect class="panel" width="126" height="184" rx="16"/>
    <text class="label" text-anchor="middle" x="63" y="52">短复盘</text>
    <text class="small" text-anchor="middle" x="63" y="90">1-3 条笔记</text>
    <text class="small" text-anchor="middle" x="63" y="118">或更新掌握度</text>
    <text class="small" text-anchor="middle" x="63" y="146">一个可跳过</text>
    <text class="small" text-anchor="middle" x="63" y="172">小题</text>
  </g>

  <path class="line" d="M802 408 C858 430 884 482 926 526"/>

  <g transform="translate(472 536)">
    <rect class="soft" width="556" height="132" rx="16"/>
    <text class="label" x="34" y="46">本地 Obsidian vault</text>
    <text class="small" x="34" y="80">Markdown 笔记 + Knowledge_Tree.md</text>
    <text class="mono" x="34" y="112">learning-state.json + optional Git sync</text>
    <path d="M430 38 h72 a14 14 0 0 1 14 14 v42 a14 14 0 0 1 -14 14 h-72 a14 14 0 0 1 -14 -14 v-42 a14 14 0 0 1 14 -14z" fill="#fff" stroke="#d6d1c4" stroke-width="2"/>
    <path d="M442 60 h48 M442 80 h34 M442 100 h56" stroke="#4d8b78" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
