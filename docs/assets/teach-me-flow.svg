<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Teach Me workflow</title>
  <desc id="desc">A diagram showing user prompts flowing through agent hooks into Teach Me, then into an Obsidian learning vault.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#eef6f1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b46b43"/>
      <stop offset="0.52" stop-color="#4d8b78"/>
      <stop offset="1" stop-color="#476f9e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1b1a18" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4d8b78"/>
    </marker>
    <style>
      .bg{fill:url(#paper)}
      .panel{fill:#ffffff;stroke:#ddd7ca;stroke-width:2;filter:url(#soft)}
      .soft{fill:#f4f1e9;stroke:#ddd7ca;stroke-width:2}
      .title{font:700 34px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1b1a18}
      .label{font:700 24px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1b1a18}
      .small{font:500 17px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#625d52}
      .mono{font:500 18px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#4a4742}
      .accent{fill:url(#accent)}
      .line{stroke:#4d8b78;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .thin{stroke:#d6d1c4;stroke-width:2;fill:none}
      .dot{fill:#4d8b78}
    </style>
  </defs>

  <rect class="bg" width="1120" height="760" rx="34"/>
  <path class="thin" d="M92 114 C250 54 390 62 520 118 S800 180 1018 96"/>
  <path class="thin" d="M78 640 C260 584 406 604 562 658 S828 718 1044 606"/>

  <g transform="translate(70 66)">
    <text class="title" x="0" y="0">Teach Me</text>
    <text class="small" x="0" y="34">Capture durable engineering knowledge without interrupting implementation.</text>
  </g>

  <g transform="translate(84 180)">
    <rect class="panel" width="246" height="164" rx="16"/>
    <circle class="accent" cx="42" cy="46" r="18"/>
    <text class="label" x="76" y="54">Prompt</text>
    <text class="small" x="28" y="94">coding, debugging,</text>
    <text class="small" x="28" y="121">review, refactor,</text>
    <text class="small" x="28" y="148">or "teach me"</text>
  </g>

  <path class="line" d="M348 262 C405 262 418 262 472 262"/>

  <g transform="translate(490 154)">
    <rect class="panel" width="284" height="216" rx="16"/>
    <text class="label" x="28" y="52">Hook layer</text>
    <text class="small" x="28" y="88">UserPromptSubmit</text>
    <text class="small" x="28" y="116">PreToolUse(Bash)</text>
    <text class="mono" x="28" y="158">additionalContext</text>
    <text class="mono" x="28" y="188">events.jsonl</text>
    <circle class="dot" cx="238" cy="52" r="8"/>
    <circle class="dot" cx="238" cy="88" r="8" opacity="0.72"/>
    <circle class="dot" cx="238" cy="124" r="8" opacity="0.44"/>
  </g>

  <path class="line" d="M792 262 C842 262 860 262 908 262"/>

  <g transform="translate(932 180)">
    <rect class="panel" width="108" height="164" rx="16"/>
    <text class="label" text-anchor="middle" x="54" y="58">Agent</text>
    <text class="small" text-anchor="middle" x="54" y="96">works</text>
    <text class="small" text-anchor="middle" x="54" y="124">normally</text>
  </g>

  <path class="line" d="M636 396 C636 442 636 462 636 504"/>

  <g transform="translate(164 516)">
    <rect class="soft" width="792" height="140" rx="16"/>
    <text class="label" x="34" y="50">Obsidian vault</text>
    <text class="small" x="34" y="86">02_Concepts / 03_Algorithmic_Ideas / 04_Project_Maps</text>
    <text class="mono" x="34" y="118">learning-state.json + wikilinks + review prompts</text>
    <path d="M650 42 h78 a14 14 0 0 1 14 14 v42 a14 14 0 0 1 -14 14 h-78 a14 14 0 0 1 -14 -14 v-42 a14 14 0 0 1 14 -14z" fill="#fff" stroke="#d6d1c4" stroke-width="2"/>
    <path d="M662 64 h54 M662 84 h38 M662 104 h62" stroke="#4d8b78" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
